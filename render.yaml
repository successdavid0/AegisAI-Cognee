# Render Blueprint for the AEGIS backend (FastAPI + SQLite + Cognee cloud).
# Deploy: push this repo to GitHub, then Render → New → Blueprint → pick this repo.
#
# FREE-TIER config: no persistent disk (Free instances don't support disks), so
# the SQLite DB lives in the container's ephemeral filesystem and RESETS on every
# redeploy/restart. That's fine here — the demo world reloads on startup via
# load_seed(), and Cognee holds the full data mirror. To make data durable later,
# switch `plan` to `starter`, add a `disk:` mounted at /data, and set
# DATABASE_URL=sqlite:////data/sentinelgraph.db.
services:
  - type: web
    name: aegis-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      # Ephemeral SQLite in the container working dir (resets on redeploy).
      - key: DATABASE_URL
        value: sqlite:///./sentinelgraph.db
      # Comma-separated allowed frontend origins (set to your Vercel URL,
      # e.g. https://aegis.vercel.app — no trailing slash).
      - key: CORS_ORIGINS
        sync: false
      # Per-client rate limit for public write endpoints (/scan, /report).
      - key: RATE_LIMIT
        value: 20/minute
      - key: COGNEE_DATASET
        value: global-threat-intel
      # Secrets — set these in the Render dashboard, never commit them.
      # ADMIN_API_KEY: REQUIRED in production. Without it, admin/memory
      # mutations fail closed (503). Generate a strong random value.
      - key: ADMIN_API_KEY
        generateValue: true
      - key: COGNEE_BASE_URL
        sync: false
      - key: COGNEE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
